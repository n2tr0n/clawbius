directories:
  output: dist
  buildResources: build
appId: com.n2tr0n.clawbius
productName: Clawbius
copyright: Copyright © 2026 Paul Lopez
extraResources:
  - from: build/ans
    to: ans
    filter: "*.ans"
  - from: build/png
    to: png
    filter: "*.png"
fileAssociations:
  - ext: .ans
    name: ANSI Art
    role: Editor
    icon: document_icon.icns
  - ext: .bin
    name: Binary Text
    role: Editor
    icon: document_icon.icns
  - ext: .xb
    name: XBin
    role: Editor
    icon: document_icon.icns
  - ext: .diz
    name: Description in Zip File
    role: Editor
    icon: document_icon.icns
  - ext: .nfo
    name: Release Information
    role: Editor
    icon: document_icon.icns
  - ext: .asc
    name: ASCII Art
    role: Editor
    icon: document_icon.icns
mac:
  artifactName: Clawbius.dmg
  category: public.app-category.graphics-design
  target:
  - target: dmg
    arch: [universal]
  darkModeSupport: true
win:
  artifactName: Clawbius.Setup.exe
  target:
  - target: nsis
    arch: [x64, ia32]
  - target: portable
    arch: [x64, ia32]
portable:
  artifactName: Clawbius.exe
linux:
  artifactName: Clawbius.${ext}
  target:
  - target: appImage
  - target: snap
  description: Clawbius is a fork of the Moebius ANSI/ASCII editor for Linux, MacOS, and Windows, extended with a local HTTP API for use with AI agents.
  category: Graphics
electronVersion: 18.2.0
